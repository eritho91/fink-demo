<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nytt inlägg - Fink</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">

    <h1 class="logo-text">Fink 🐦‍⬛</h1>

    <div class="form-container">
        <h2 class="page-title">Nytt inlägg</h2>

        <form action="/save" method="post" th:object="${post}" style="display:flex; flex-direction:column; gap:10px;">
            <label for="species">Art:</label>
            <input id="species" type="text" th:field="*{species}" placeholder="Ex: Domherre">

            <label for="location">Plats:</label>
            <input id="location" type="text" th:field="*{location}" placeholder="Ex: Stockholm">

            <button type="submit">Spara</button>
        </form>
    </div>

    <a href="/home" class="button-link">Gå tillbaka</a>

</div>
</body>
</html>
