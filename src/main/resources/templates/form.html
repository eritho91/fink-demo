<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nytt inlägg - Fink</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
<h2 style="text-align:center;">Nytt inlägg</h2>

<form action="/save" method="post" th:object="${post}" class="form-container">
    <label>Art:</label>
    <input type="text" th:field="*{species}" placeholder="Ex: Domherre"/>

    <label>Plats:</label>
    <input type="text" th:field="*{location}" placeholder="Ex: Stockholm"/>

    <button type="submit">Spara</button>
    <a href="/"><button type="button">Gå tillbaka</button></a>
</form>
</body>
</html>
