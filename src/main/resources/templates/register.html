<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrera konto - Fink</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">

    <h1>Registrera konto 🐦‍⬛</h1>

    <form action="/register" method="post" class="form-container">
        <label>Användarnamn:</label>
        <input type="text" name="username" placeholder="Välj ett användarnamn" required/>

        <label>Lösenord:</label>
        <input type="password" name="password" placeholder="Välj ett lösenord" required/>

        <button type="submit">Registrera</button>
    </form>

    <div style="margin-top: 20px; text-align: center;">
        <a href="/"><button class="new-post-btn">Tillbaka till login</button></a>
    </div>

</div>
</body>
</html>
