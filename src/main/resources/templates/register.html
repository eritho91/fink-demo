<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrera konto - Fink</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">

    <h1 class="logo-text">Fink 🐦‍⬛</h1>

    <div class="form-container">
        <h2 class="page-title">Registrera konto</h2>

        <div th:if="${error}" class="error-text" th:text="${error}"></div>

        <form action="/register" method="post" style="display:flex; flex-direction:column; gap:10px;">
            <label for="username">Användarnamn:</label>
            <input id="username" type="text" name="username" placeholder="Välj ett användarnamn" required>

            <label for="password">Lösenord:</label>
            <input id="password" type="password" name="password" placeholder="Välj ett lösenord" required>

            <button type="submit">Registrera</button>
        </form>
    </div>

    <a href="/" class="button-link">Tillbaka till login</a>

</div>
</body>
</html>
