<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fink - Hem</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">

    <h1 class="logo-text">Fink 🐦‍⬛</h1>

    <a href="/new" class="button-link">Nytt inlägg</a>

    <div class="list-container">
        <h3 class="section-title">Tidigare sedda</h3>

        <div th:if="${#lists.isEmpty(posts)}" class="center-text">
            Inga inlägg ännu.
        </div>

        <div th:each="post : ${posts}" class="post-card">
            <span class="post-species" th:text="${post.species}">Art</span>
            <span class="post-location" th:text="'Plats: ' + ${post.location}">Plats</span>
            <span class="post-date" th:text="'Tid: ' + ${post.createdAt}">Tid</span>
        </div>
    </div>

</div>
</body>
</html>
